name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          draft: true
          body: |
            ## Install

            **macOS** — Pigeon is not notarized by Apple, so the first launch is blocked.
            1. Open the `.dmg` and drag **Pigeon** into Applications.
            2. **Right-click** Pigeon → **Open** → **Open**.

            If you see *"Pigeon is damaged and can't be opened"*, run this once in Terminal:
            ```
            xattr -cr /Applications/Pigeon.app
            ```

            **Windows** — run the `.exe` installer. SmartScreen may warn (unsigned): **More info → Run anyway**.

            **Linux** — `.AppImage` (chmod +x, then run) or install the `.deb`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tauri:
    name: Build — ${{ matrix.artifact_name }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon → .dmg (+ app for updater)
          - platform: macos-14
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin --bundles app,dmg'
            artifact_name: macOS-Apple-Silicon

          # macOS Intel → .dmg (+ app for updater)
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin --bundles app,dmg'
            artifact_name: macOS-Intel

          # Windows → .exe (NSIS installer)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: '--target x86_64-pc-windows-msvc --bundles nsis'
            artifact_name: Windows-x64

          # Linux → .AppImage + .deb
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: '--bundles appimage,deb'
            artifact_name: Linux-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    name: Publish Release
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft → public
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            })
